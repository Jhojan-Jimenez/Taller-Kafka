version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# ShopTech — Observabilidad con OpenTelemetry
#
# Local : docker compose up --build
#         Los puertos se mapean via docker-compose.override.yml (ver abajo)
#
# VPS   : Coolify NO necesita ports: — usa su proxy (Traefik) para el acceso
#         externo. Los servicios se hablan internamente por nombre de servicio.
#         Variables requeridas en Coolify dashboard:
#           NEW_RELIC_LICENSE_KEY = NRAK-...
# ──────────────────────────────────────────────────────────────────────────────

networks:
  shoptech:
    driver: bridge

volumes:
  postgres_data:

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: shoptech
      POSTGRES_USER: shoptech
      POSTGRES_PASSWORD: shoptech
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks: [shoptech]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shoptech"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── OTel Collector ───────────────────────────────────────────────────────────
  otel-collector:
    build: ./otel-collector
    restart: unless-stopped
    environment:
      NEW_RELIC_LICENSE_KEY: "${NEW_RELIC_LICENSE_KEY}"
    expose:
      - "4317"   # OTLP gRPC  — interno
      - "4318"   # OTLP HTTP  — interno
      - "8888"   # metricas del collector — interno
    networks: [shoptech]
    depends_on:
      - jaeger

  # ── Jaeger UI ────────────────────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: memory
      MEMORY_MAX_TRACES: "50000"
    expose:
      - "16686"  # UI — Coolify le asigna dominio/subdominio
      - "4317"   # OTLP gRPC — interno
    networks: [shoptech]

  # ── xxx-service: order-service ───────────────────────────────────────────────
  order-service:
    build: ./order-service
    restart: unless-stopped
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      OTEL_SERVICE_NAME: "order-service"
      INVENTORY_SERVICE_URL: "http://inventory-service:8001"
      ENVIRONMENT: "production"
      SERVICE_VERSION: "1.0.0"
    expose:
      - "8000"   # API — Coolify le asigna dominio/subdominio
    networks: [shoptech]
    depends_on:
      - otel-collector
      - inventory-service

  # ── yyy-service: inventory-service ──────────────────────────────────────────
  inventory-service:
    build: ./inventory-service
    restart: unless-stopped
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      OTEL_SERVICE_NAME: "inventory-service"
      DATABASE_URL: "postgresql+asyncpg://shoptech:shoptech@postgres:5432/shoptech"
      ENVIRONMENT: "production"
      SERVICE_VERSION: "1.0.0"
    expose:
      - "8001"   # solo interno, llamado por order-service
    networks: [shoptech]
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
