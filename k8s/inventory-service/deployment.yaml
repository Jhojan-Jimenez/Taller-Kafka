# NOTA: ACR_NAME_PLACEHOLDER se reemplaza automáticamente por deploy-azure.ps1
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: shoptech
  labels:
    app: inventory-service
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
        version: "1.0.0"
    spec:
      containers:
        - name: inventory-service
          image: ACR_NAME_PLACEHOLDER.azurecr.io/inventory-service:latest
          ports:
            - containerPort: 8001
              name: http
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "otel-collector:4317"
            - name: OTEL_SERVICE_NAME
              value: "inventory-service"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: shoptech-secrets
                  key: db-url
            - name: ENVIRONMENT
              value: "production"
            - name: SERVICE_VERSION
              value: "1.0.0"
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
