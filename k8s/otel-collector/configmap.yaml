apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: shoptech
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 400
        spike_limit_mib: 100

      batch:
        send_batch_size: 512
        send_batch_max_size: 1024
        timeout: 10s

      resourcedetection:
        detectors: [env, system]
        timeout: 5s

    exporters:
      debug:
        verbosity: normal

      otlp/jaeger:
        endpoint: jaeger:4317
        tls:
          insecure: true

      otlphttp/newrelic:
        endpoint: https://otlp.nr-data.net
        headers:
          api-key: "${env:NEW_RELIC_LICENSE_KEY}"
        compression: gzip
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s
        sending_queue:
          enabled: true
          num_consumers: 4
          queue_size: 1000

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      zpages:
        endpoint: 0.0.0.0:55679

    service:
      extensions: [health_check, zpages]
      pipelines:
        traces:
          receivers:  [otlp]
          processors: [memory_limiter, resourcedetection, batch]
          exporters:  [debug, otlp/jaeger, otlphttp/newrelic]
        metrics:
          receivers:  [otlp]
          processors: [memory_limiter, resourcedetection, batch]
          exporters:  [debug, otlphttp/newrelic]
        logs:
          receivers:  [otlp]
          processors: [memory_limiter, resourcedetection, batch]
          exporters:  [debug, otlphttp/newrelic]
      telemetry:
        logs:
          level: info
        metrics:
          address: 0.0.0.0:8888
