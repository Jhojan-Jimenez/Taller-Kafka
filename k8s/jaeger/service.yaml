apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: shoptech
spec:
  selector:
    app: jaeger
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
  type: ClusterIP
---
# UI expuesta con LoadBalancer para acceso desde internet
apiVersion: v1
kind: Service
metadata:
  name: jaeger-ui
  namespace: shoptech
spec:
  selector:
    app: jaeger
  ports:
    - name: ui
      port: 80
      targetPort: 16686
  type: LoadBalancer
