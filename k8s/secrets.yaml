# PLANTILLA — NO hacer commit con valores reales.
# El script deploy-azure.ps1 crea este Secret con kubectl create secret.
#
# Para crearlo manualmente:
#   kubectl create secret generic shoptech-secrets \
#     --from-literal=new-relic-license-key="TU_CLAVE_AQUI" \
#     --from-literal=db-password="shoptech" \
#     -n shoptech
#
apiVersion: v1
kind: Secret
metadata:
  name: shoptech-secrets
  namespace: shoptech
type: Opaque
stringData:
  new-relic-license-key: "REEMPLAZAR_CON_TU_LICENSE_KEY"
  db-password: "shoptech"
  db-url: "postgresql+asyncpg://shoptech:shoptech@postgres:5432/shoptech"
